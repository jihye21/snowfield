<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Snow Footprints</title>

    <meta name="description"
        content="A quiet place where your footsteps remain in the snow.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <canvas id="snow"></canvas>

    <div id="overlay">

        <div class="title">
            Snow
        </div>

        <div class="subtitle">
            Leave your footprints.
        </div>

    </div>

    <div id="status">
        <div id="dayCounter"></div>
        <div id="footprintCounter"></div>
    </div>

    <div id="welcome" class="hidden">

        <div class="card">

            <h2>Welcome</h2>

            <p>
                Walk slowly.<br>
                Your footprints will remain here.
            </p>

            <button id="startButton">
                Begin
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
